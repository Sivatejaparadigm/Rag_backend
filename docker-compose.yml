services:
  postgres:
    image: postgres:16
    container_name: rag_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-rag_db}
      POSTGRES_USER: ${DB_USER:-rag_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-rag_password}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - rag_postgres_data:/var/lib/postgresql/data

volumes:
  rag_postgres_data:

